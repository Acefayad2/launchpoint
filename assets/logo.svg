<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 48" fill="none" role="img" aria-label="LaunchPoint">
  <defs>
    <linearGradient id="mark-grad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="55%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
    <linearGradient id="arrow-grad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Icon mark: rounded square -->
  <rect x="0" y="0" width="48" height="48" rx="12" fill="url(#mark-grad)"/>

  <!-- Origin dot (the "point") -->
  <circle cx="14" cy="34" r="3.5" fill="url(#arrow-grad)" filter="url(#glow)"/>

  <!-- Trajectory line -->
  <line x1="15.8" y1="32.2" x2="31" y2="17" stroke="url(#arrow-grad)" stroke-width="2.4" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Arrowhead -->
  <path d="M24 13 L35.5 13 L35.5 24.5" stroke="url(#arrow-grad)" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none" filter="url(#glow)"/>

  <!-- Horizontal accent tick at origin -->
  <line x1="9" y1="34" x2="14" y2="34" stroke="url(#arrow-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="14" y1="39" x2="14" y2="34" stroke="url(#arrow-grad)" stroke-width="2" stroke-linecap="round" opacity="0.6"/>

  <!-- Wordmark -->
  <text x="60" y="31" font-family="'Syne', 'Inter', -apple-system, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5" fill="#f0f2ff">Launch</text>
  <text x="137" y="31" font-family="'Syne', 'Inter', -apple-system, sans-serif" font-size="22" font-weight="800" letter-spacing="-0.5" fill="url(#mark-grad)">Point</text>
</svg>
